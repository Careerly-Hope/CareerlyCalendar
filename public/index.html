<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/logo3.png" type="image/png" sizes="32x32" />
  <title>CareerlyAI — Content Ideas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0e0f;
      --surface: #18181b;
      --border: #2a2a2e;
      --accent: #8010b4d7;
      --accent-dim: #af42e6;
      --text: #f0f0ee;
      --muted: #6b6b72;
      --reel: #f47c5a;
      --carousel: #60b8f4;
      --other: #b88cf4;
      --idea: #8f8fe0;
      --draft: #f4c760;
      --ready: #60b8f4;
      --posted: #1ce451;
      --danger: #f45a5a;
      --radius: 10px;
      --mono: 'DM Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }

    /* ── SPINNER ────────────────────────────────── */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      opacity: 0.8;
    }
    .btn-loading {
      opacity: 0.7;
      pointer-events: none;
      cursor: not-allowed !important;
    }

    /* ── LOCK SCREEN ────────────────────────────── */
    #lock-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      flex-direction: column;
      gap: 24px;
      padding: 24px;
    }
    #lock-screen h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
    }
    #lock-screen h1 span { color: var(--accent); }
    #lock-screen p { color: var(--muted); font-family: var(--mono); font-size: 0.8rem; }
    #lock-form { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 340px; }
    #lock-form input {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 1rem;
      padding: 14px 16px;
      outline: none;
      transition: border-color .2s;
      width: 100%;
    }
    #lock-form input:focus { border-color: var(--accent); }
    #btn-unlock {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #0e0e0f;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 0.95rem;
      font-weight: 700;
      padding: 14px;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 50px;
    }
    #btn-unlock:hover:not(.btn-loading) { background: var(--accent-dim); }
    #lock-error {
      color: var(--danger);
      font-family: var(--mono);
      font-size: 0.78rem;
      display: none;
      text-align: center;
    }

    /* ── APP SHELL ──────────────────────────────── */
    #app { display: none; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 1.15rem; font-weight: 800; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    #btn-add {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #0e0e0f;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 700;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 100px;
      justify-content: center;
      transition: background .15s, opacity .15s;
    }
    #btn-add:hover:not(.btn-loading) { background: var(--accent-dim); }

    /* ── FILTERS ────────────────────────────────── */
    #filters {
      padding: 14px 20px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }
    #filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 6px 14px;
      white-space: nowrap;
      transition: all .15s;
    }
    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── CONTENT LIST ───────────────────────────── */
    #content-list {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 720px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: border-color .15s;
    }
    .card:hover { border-color: var(--accent); }

    .card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .badge {
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 0.68rem;
      font-weight: 500;
      padding: 3px 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .type-reel    { background: #f47c5a22; color: var(--reel); }
    .type-carousel{ background: #60b8f422; color: var(--carousel); }
    .type-other   { background: #b88cf422; color: var(--other); }
    .status-idea   { background: #6b6b7222; color: var(--idea); }
    .status-draft  { background: #f4c76022; color: var(--draft); }
    .status-ready  { background: #60b8f422; color: var(--ready); }
    .status-posted { background: #76d98e22; color: var(--posted); }

    .card-num { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); margin-left: auto; }

    .card h3 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .card-meta {
      display: flex;
      gap: 12px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    #empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.85rem;
      display: none;
    }

    /* ── MODAL ──────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 720px;
      max-height: 92vh;
      overflow-y: auto;
      padding: 24px 20px 40px;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-header h2 { font-size: 1.1rem; font-weight: 700; }
    .modal-close {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 1.3rem; line-height: 1;
      transition: color .15s;
    }
    .modal-close:hover { color: var(--text); }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.88rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color .2s;
      width: 100%;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { min-height: 160px; resize: vertical; line-height: 1.6; }
    .form-group select option { background: var(--surface); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn-primary {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #0e0e0f;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 700;
      padding: 14px;
      width: 100%;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 50px;
      transition: background .15s, opacity .15s;
    }
    .btn-primary:hover:not(.btn-loading) { background: var(--accent-dim); }

    .btn-danger {
      background: none;
      border: 1.5px solid var(--danger);
      border-radius: 8px;
      color: var(--danger);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 10px;
      width: 100%;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      transition: opacity .15s;
    }
    /* Spinner color override for dark buttons */
    .btn-danger .spinner {
      border-color: var(--danger);
      border-top-color: transparent;
    }

    /* ── DETAIL VIEW ────────────────────────────── */
    .detail-desc {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 0.82rem;
      line-height: 1.8;
      padding: 16px;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 16px;
      max-height: 40vh;
      overflow-y: auto;
    }
    .detail-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .detail-meta-item label {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 3px;
    }
    .detail-meta-item span {
      font-size: 0.85rem;
      font-weight: 600;
    }

    /* ── LOADER ─────────────────────────────────── */
    #loader {
      text-align: center;
      padding: 40px;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
  </style>
</head>
<body>

<!-- ══ LOCK SCREEN ══════════════════════════════════════════ -->
<div id="lock-screen">
  <div style="text-align:center">
    <h1>HACO<span> Tech</span></h1>
    <p style="margin-top:8px">Content Ideas Board</p>
  </div>
  <div id="lock-form">
    <input type="password" id="pw-input" placeholder="Enter team password" autocomplete="current-password" />
    <button id="btn-unlock" onclick="unlock()">Enter →</button>
    <div id="lock-error">Wrong password. Try again.</div>
  </div>
</div>

<!-- ══ APP ══════════════════════════════════════════════════ -->
<div id="app">
  <header>
    <h1>HACO<span> Tech</span></h1>
    <button id="btn-add" onclick="openCreateModal()">+ Add Idea</button>
  </header>

  <div id="filters">
    <button class="filter-btn active" data-filter="" onclick="setFilter(this, '')">All</button>
    <button class="filter-btn" data-status="idea" onclick="setStatusFilter(this, 'idea')">Idea</button>
    <button class="filter-btn" data-status="draft" onclick="setStatusFilter(this, 'draft')">Draft</button>
    <button class="filter-btn" data-status="ready" onclick="setStatusFilter(this, 'ready')">Ready</button>
    <button class="filter-btn" data-status="posted" onclick="setStatusFilter(this, 'posted')">Posted</button>
    <button class="filter-btn" data-type="reel" onclick="setTypeFilter(this, 'reel')">Reels</button>
    <button class="filter-btn" data-type="carousel" onclick="setTypeFilter(this, 'carousel')">Carousels</button>
  </div>

  <div id="loader" style="display:none"><span class="spinner" style="border-color:var(--muted);border-top-color:transparent"></span> Loading...</div>
  <div id="empty-state">No content ideas yet. Tap + Add Idea to start.</div>
  <div id="content-list"></div>
</div>

<!-- ══ CREATE / EDIT MODAL ══════════════════════════════════ -->
<div class="modal-overlay" id="form-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">New Idea</h2>
      <button class="modal-close" onclick="closeModal('form-modal')">✕</button>
    </div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="f-title" placeholder="e.g. 3 Career Mistakes Students Make" />
    </div>
    <div class="form-group">
      <label>Script / Copy</label>
      <textarea id="f-desc" placeholder="Full script or carousel copy..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Type</label>
        <select id="f-type">
          <option value="reel">Reel</option>
          <option value="carousel">Carousel</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option value="idea">Idea</option>
          <option value="draft">Draft</option>
          <option value="ready">Ready</option>
          <option value="posted">Posted</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Week</label>
        <input type="text" id="f-week" placeholder="e.g. Week 1" />
      </div>
      <div class="form-group">
        <label>Scheduled Date</label>
        <input type="date" id="f-date" />
      </div>
    </div>
    <div class="form-group">
      <label>Handled By</label>
      <select id="f-member">
        <option value="">— Unassigned —</option>
      </select>
    </div>
    <div class="form-group">
      <label>Content #</label>
      <input type="number" id="f-num" placeholder="e.g. 1" />
    </div>
    <button class="btn-primary" id="btn-save" onclick="submitForm()">Save Idea</button>
  </div>
</div>

<!-- ══ DETAIL MODAL ══════════════════════════════════════════ -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="d-title">—</h2>
      <button class="modal-close" onclick="closeModal('detail-modal')">✕</button>
    </div>
    <div id="d-badges" style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap"></div>
    <div class="detail-desc" id="d-desc"></div>
    <div class="detail-meta-grid">
      <div class="detail-meta-item"><label>Week</label><span id="d-week">—</span></div>
      <div class="detail-meta-item"><label>Date</label><span id="d-date">—</span></div>
      <div class="detail-meta-item"><label>Handled By</label><span id="d-member">—</span></div>
      <div class="detail-meta-item"><label>Content #</label><span id="d-num">—</span></div>
    </div>
    <button class="btn-primary" id="d-edit-btn">Edit</button>
    <button class="btn-danger" id="d-delete-btn">Delete</button>
  </div>
</div>

<script>
  // ── STATE ──────────────────────────────────────────────────
  let PASSWORD = '';
  let members = [];
  let currentFilter = { status: '', contentType: '' };
  let editingId = null;
  let currentDetailId = null;

  // ── BUTTON LOADING HELPERS ─────────────────────────────────
  function setLoading(btn, loading, label) {
    if (loading) {
      btn.dataset.originalHtml = btn.innerHTML;
      btn.innerHTML = `<span class="spinner"></span>${label ? `<span>${label}</span>` : ''}`;
      btn.classList.add('btn-loading');
      btn.disabled = true;
    } else {
      btn.innerHTML = btn.dataset.originalHtml || btn.innerHTML;
      btn.classList.remove('btn-loading');
      btn.disabled = false;
    }
  }

  // ── LOCK / UNLOCK ──────────────────────────────────────────
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') unlock();
  });

  async function unlock() {
    const pw = document.getElementById('pw-input').value.trim();
    if (!pw) return;
    const btn = document.getElementById('btn-unlock');
    setLoading(btn, true, 'Verifying…');
    document.getElementById('lock-error').style.display = 'none';
    try {
      const res = await fetch('/api/team-members', {
        headers: { 'x-app-password': pw }
      });
      if (!res.ok) throw new Error();
      const data = await res.json();
      PASSWORD = pw;
      members = data.members ?? [];
      populateMembers();
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadContent();
    } catch {
      setLoading(btn, false);
      document.getElementById('lock-error').style.display = 'block';
    }
  }

  function populateMembers() {
    const sel = document.getElementById('f-member');
    members.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m; opt.textContent = m;
      sel.appendChild(opt);
    });
  }

  // ── API HELPERS ────────────────────────────────────────────
  function api(path, opts = {}) {
    return fetch(path, {
      ...opts,
      headers: {
        'Content-Type': 'application/json',
        'x-app-password': PASSWORD,
        ...(opts.headers ?? {}),
      },
    }).then(r => r.json());
  }

  // ── LOAD + RENDER LIST ─────────────────────────────────────
  async function loadContent() {
    const loader = document.getElementById('loader');
    loader.style.display = 'flex';
    document.getElementById('content-list').innerHTML = '';
    document.getElementById('empty-state').style.display = 'none';

    // Also show loading on "Add Idea" button while list refreshes
    const btnAdd = document.getElementById('btn-add');
    setLoading(btnAdd, true, '');

    let url = '/api/content';
    const params = new URLSearchParams();
    if (currentFilter.status) params.set('status', currentFilter.status);
    if (currentFilter.contentType) params.set('contentType', currentFilter.contentType);
    if ([...params].length) url += '?' + params.toString();

    try {
      const items = await api(url);
      loader.style.display = 'none';
      setLoading(btnAdd, false);

      if (!items.length) {
        document.getElementById('empty-state').style.display = 'block';
        return;
      }

      const list = document.getElementById('content-list');
      items.forEach(item => list.appendChild(renderCard(item)));
    } catch {
      loader.style.display = 'none';
      setLoading(btnAdd, false);
    }
  }

  function renderCard(item) {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openDetail(item);
    card.innerHTML = `
      <div class="card-top">
        <span class="badge type-${item.contentType}">${item.contentType}</span>
        <span class="badge status-${item.status}">${item.status}</span>
        ${item.contentNumber ? `<span class="card-num">#${item.contentNumber}</span>` : ''}
      </div>
      <h3>${escHtml(item.title)}</h3>
      <div class="card-meta">
        ${item.week ? `<span>${escHtml(item.week)}</span>` : ''}
        ${item.handledBy ? `<span>→ ${escHtml(item.handledBy)}</span>` : ''}
        ${item.scheduledDate ? `<span>${item.scheduledDate}</span>` : ''}
      </div>
    `;
    return card;
  }

  // ── FILTERS ────────────────────────────────────────────────
  function setFilter(btn, val) {
    currentFilter = { status: '', contentType: '' };
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadContent();
  }
  function setStatusFilter(btn, val) {
    currentFilter = { status: val, contentType: '' };
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadContent();
  }
  function setTypeFilter(btn, val) {
    currentFilter = { status: '', contentType: val };
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadContent();
  }

  // ── CREATE / EDIT MODAL ────────────────────────────────────
  function openCreateModal() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'New Idea';
    clearForm();
    // Reset save button label
    const saveBtn = document.getElementById('btn-save');
    saveBtn.innerHTML = 'Save Idea';
    openModal('form-modal');
  }

  function openEditModal(item) {
    editingId = item.id;
    document.getElementById('modal-title').textContent = 'Edit Idea';
    document.getElementById('f-title').value = item.title ?? '';
    document.getElementById('f-desc').value = item.description ?? '';
    document.getElementById('f-type').value = item.contentType ?? 'reel';
    document.getElementById('f-status').value = item.status ?? 'idea';
    document.getElementById('f-week').value = item.week ?? '';
    document.getElementById('f-date').value = item.scheduledDate ?? '';
    document.getElementById('f-member').value = item.handledBy ?? '';
    document.getElementById('f-num').value = item.contentNumber ?? '';
    // Reset save button label
    const saveBtn = document.getElementById('btn-save');
    saveBtn.innerHTML = 'Save Idea';
    saveBtn.classList.remove('btn-loading');
    saveBtn.disabled = false;
    closeModal('detail-modal');
    openModal('form-modal');
  }

  async function submitForm() {
    const body = {
      title: document.getElementById('f-title').value.trim(),
      description: document.getElementById('f-desc').value.trim(),
      contentType: document.getElementById('f-type').value,
      status: document.getElementById('f-status').value,
      week: document.getElementById('f-week').value.trim() || undefined,
      scheduledDate: document.getElementById('f-date').value || undefined,
      handledBy: document.getElementById('f-member').value || undefined,
      contentNumber: document.getElementById('f-num').value ? parseInt(document.getElementById('f-num').value) : undefined,
    };
    if (!body.title || !body.description) return alert('Title and script are required.');

    const btn = document.getElementById('btn-save');
    setLoading(btn, true, editingId ? 'Saving…' : 'Creating…');

    try {
      if (editingId) {
        await api(`/api/content/${editingId}`, { method: 'PATCH', body: JSON.stringify(body) });
      } else {
        await api('/api/content', { method: 'POST', body: JSON.stringify(body) });
      }
      closeModal('form-modal');
      loadContent();
    } catch {
      setLoading(btn, false);
    }
  }

  // ── DETAIL MODAL ───────────────────────────────────────────
  function openDetail(item) {
    currentDetailId = item.id;
    document.getElementById('d-title').textContent = item.title;
    document.getElementById('d-desc').textContent = item.description;
    document.getElementById('d-week').textContent = item.week || '—';
    document.getElementById('d-date').textContent = item.scheduledDate || '—';
    document.getElementById('d-member').textContent = item.handledBy || '—';
    document.getElementById('d-num').textContent = item.contentNumber ?? '—';

    const badges = document.getElementById('d-badges');
    badges.innerHTML = `
      <span class="badge type-${item.contentType}">${item.contentType}</span>
      <span class="badge status-${item.status}">${item.status}</span>
    `;

    // Reset button states when opening fresh
    const editBtn = document.getElementById('d-edit-btn');
    const deleteBtn = document.getElementById('d-delete-btn');
    editBtn.innerHTML = 'Edit';
    editBtn.classList.remove('btn-loading');
    editBtn.disabled = false;
    deleteBtn.innerHTML = 'Delete';
    deleteBtn.classList.remove('btn-loading');
    deleteBtn.disabled = false;

    editBtn.onclick = () => openEditModal(item);
    deleteBtn.onclick = () => deleteItem(item.id);
    openModal('detail-modal');
  }

  async function deleteItem(id) {
    if (!confirm('Delete this content idea?')) return;
    const btn = document.getElementById('d-delete-btn');
    setLoading(btn, true, 'Deleting…');
    try {
      await api(`/api/content/${id}`, { method: 'DELETE' });
      closeModal('detail-modal');
      loadContent();
    } catch {
      setLoading(btn, false);
    }
  }

  // ── MODAL HELPERS ──────────────────────────────────────────
  function openModal(id) {
    document.getElementById(id).classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
    document.body.style.overflow = '';
  }

  // Close modal on overlay click
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeModal(overlay.id);
    });
  });

  function clearForm() {
    ['f-title','f-desc','f-week','f-date','f-num'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('f-type').value = 'reel';
    document.getElementById('f-status').value = 'idea';
    document.getElementById('f-member').value = '';
  }

  function escHtml(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
